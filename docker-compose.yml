version: "3.8"

services:
    # PostgreSQL Database
    postgres:
        image: postgres:14-alpine
        container_name: app-postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: app_db
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network

    pgadmin:
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@demo.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - 9001:80
        depends_on:
            - postgres
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    postgres_data:
